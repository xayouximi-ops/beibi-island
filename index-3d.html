<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贝比岛 3D - 我的梦幻小岛</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
        }

        /* UI 覆盖层 */
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #ui-overlay > * {
            pointer-events: auto;
        }

        /* 顶部信息栏 */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.8), transparent);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .player-avatar {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
        }

        .player-name {
            font-weight: bold;
            font-size: 1.1em;
        }

        .level-badge {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #333;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.8em;
            font-weight: bold;
        }

        .resources {
            display: flex;
            gap: 15px;
        }

        .resource {
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            backdrop-filter: blur(10px);
        }

        /* 底部操作栏 */
        .bottom-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(255,255,255,0.9);
            padding: 15px 25px;
            border-radius: 50px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .action-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 1.5em;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .action-btn span {
            font-size: 0.6em;
            position: absolute;
            bottom: -20px;
            color: #333;
            font-weight: bold;
        }

        /* 右侧菜单 */
        .side-menu {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .menu-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: white;
            color: #667eea;
            font-size: 1.3em;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        .menu-btn:hover {
            background: #667eea;
            color: white;
            transform: scale(1.1);
        }

        /* 加载界面 */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 9999;
        }

        .loading-logo {
            font-size: 5em;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .loading-text {
            margin-top: 20px;
            font-size: 1.5em;
        }

        .loading-bar {
            width: 300px;
            height: 10px;
            background: rgba(255,255,255,0.3);
            border-radius: 5px;
            margin-top: 20px;
            overflow: hidden;
        }

        .loading-progress {
            height: 100%;
            background: white;
            width: 0%;
            transition: width 0.3s;
        }

        /* 登录界面 */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9998;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        .game-logo {
            font-size: 3em;
            color: #667eea;
            margin-bottom: 10px;
        }

        .start-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            cursor: pointer;
            margin-top: 20px;
        }

        /* 弹窗 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9997;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            color: #667eea;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: #888;
        }

        /* 通知 */
        .notification {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 15px 30px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            z-index: 10000;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* 对话框 */
        .dialog-box {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            max-width: 400px;
            text-align: center;
        }

        .dialog-text {
            font-size: 1.1em;
            color: #333;
        }
    </style>
</head>
<body>
    <!-- 加载界面 -->
    <div id="loading-screen">
        <div class="loading-logo">🏝️</div>
        <div class="loading-text">加载中...</div>
        <div class="loading-bar">
            <div class="loading-progress" id="loading-progress"></div>
        </div>
    </div>

    <!-- 登录界面 -->
    <div id="login-screen" style="display: none;">
        <div class="login-container">
            <h1 class="game-logo">🏝️ 贝比岛 3D</h1>
            <p class="game-subtitle">创造你的梦幻小岛</p>
            <div class="character-creator">
                <div class="character-preview">
                    <div id="preview-avatar" class="avatar-preview" style="font-size: 5em; margin: 20px;">👧</div>
                </div>
                <div class="creator-options" style="text-align: left; margin: 20px 0;">
                    <div class="option-group">
                        <label>昵称</label>
                        <input type="text" id="player-name" placeholder="输入你的名字" maxlength="8" style="width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px;">
                    </div>
                    <div class="option-group">
                        <label>性别</label>
                        <div class="gender-select" style="display: flex; gap: 10px;">
                            <button class="gender-btn active" onclick="setGender('female')" style="flex: 1; padding: 10px; border: 2px solid #667eea; background: #667eea; color: white; border-radius: 8px;">👧 女孩</button>
                            <button class="gender-btn" onclick="setGender('male')" style="flex: 1; padding: 10px; border: 2px solid #ddd; background: white; border-radius: 8px;">👦 男孩</button>
                        </div>
                    </div>
                </div>
                <button class="start-btn" onclick="startGame()">🏝️ 开始冒险</button>
            </div>
        </div>
    </div>

    <!-- 游戏容器 -->
    <div id="game-container">
        <!-- 3D 画布 -->
        <div id="canvas-container"></div>

        <!-- UI 覆盖层 -->
        <div id="ui-overlay">
            <!-- 顶部信息栏 -->
            <div class="top-bar">
                <div class="player-info">
                    <div class="player-avatar" id="player-avatar">👧</div>
                    <div>
                        <div class="player-name" id="player-name-display">玩家</div>
                        <div class="level-badge">Lv.<span id="player-level">1</span></div>
                    </div>
                </div>
                <div class="resources">
                    <div class="resource">💰 <span id="coin-display">0</span></div>
                    <div class="resource">💎 <span id="gem-display">0</span></div>
                    <div class="resource">⭐ <span id="exp-display">0</span></div>
                </div>
            </div>

            <!-- 右侧菜单 -->
            <div class="side-menu">
                <button class="menu-btn" onclick="openBag()" title="背包">🎒</button>
                <button class="menu-btn" onclick="openQuests()" title="任务">📋</button>
                <button class="menu-btn" onclick="openFriends()" title="好友">👥</button>
                <button class="menu-btn" onclick="openSettings()" title="设置">⚙️</button>
            </div>

            <!-- 底部操作栏 -->
            <div class="bottom-bar">
                <button class="action-btn" onclick="moveForward()" title="前进 (W)">⬆️<span>W</span></button>
                <button class="action-btn" onclick="moveBackward()" title="后退 (S)">⬇️<span>S</span></button>
                <button class="action-btn" onclick="rotateLeft()" title="左转 (A)">⬅️<span>A</span></button>
                <button class="action-btn" onclick="rotateRight()" title="右转 (D)">➡️<span>D</span></button>
                <button class="action-btn" onclick="interact()" title="互动 (E)">✋<span>E</span></button>
                <button class="action-btn" onclick="openShop()" title="商店">🏪</button>
            </div>
        </div>
    </div>

    <!-- 弹窗模板 -->
    <div id="modal-template" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">标题</h3>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Three.js -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

    <script src="game-3d.js"></script>
</body>
</html>
